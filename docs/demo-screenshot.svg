<svg xmlns="http://www.w3.org/2000/svg" width="980" height="1568" viewBox="0 0 980 1568" role="img" aria-label="Aethel demo screenshot">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0b1324"/>
<stop offset="55%" stop-color="#111827"/>
<stop offset="100%" stop-color="#1f2937"/>
</linearGradient>
<linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#22c55e"/>
<stop offset="50%" stop-color="#38bdf8"/>
<stop offset="100%" stop-color="#f59e0b"/>
</linearGradient>
</defs>
<rect width="980" height="1568" rx="24" fill="url(#bg)"/>
<rect x="22" y="22" width="936" height="1524" rx="18" fill="#0a0f1a" stroke="#243044"/>
<rect x="22" y="22" width="936" height="32" rx="18" fill="#10192a"/>
<circle cx="48" cy="38" r="6" fill="#fb7185"/>
<circle cx="68" cy="38" r="6" fill="#f59e0b"/>
<circle cx="88" cy="38" r="6" fill="#22c55e"/>
<rect x="118" y="33" width="280" height="10" rx="5" fill="url(#glow)" opacity="0.8"/>
<g fill="#dbe4f0" font-family="SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="20">
<text x="54" y="86" xml:space="preserve">Aethel demo</text>
<text x="54" y="114" xml:space="preserve">Workspace: /tmp/aethel-demo-XXXXXX</text>
<text x="54" y="142" xml:space="preserve">Backend: fake Google Drive</text>
<text x="54" y="170" xml:space="preserve"></text>
<text x="54" y="198" xml:space="preserve">Scenario:</text>
<text x="54" y="226" xml:space="preserve">  Drive changed docs/spec.txt and added design/roadmap.txt</text>
<text x="54" y="254" xml:space="preserve">  Local changed notes/ideas.txt and added drafts/todo.txt</text>
<text x="54" y="282" xml:space="preserve"></text>
<text x="54" y="310" xml:space="preserve">$ aethel status</text>
<text x="54" y="338" xml:space="preserve">Remote changes (2):</text>
<text x="54" y="366" xml:space="preserve">  MR docs/spec.txt  (modified on Drive)</text>
<text x="54" y="394" xml:space="preserve">  +R design/roadmap.txt  (new on Drive)</text>
<text x="54" y="422" xml:space="preserve">Local changes (2):</text>
<text x="54" y="450" xml:space="preserve">  ML notes/ideas.txt  (modified locally)</text>
<text x="54" y="478" xml:space="preserve">  +L drafts/todo.txt  (new locally)</text>
<text x="54" y="506" xml:space="preserve"></text>
<text x="54" y="534" xml:space="preserve">$ aethel diff --side all</text>
<text x="54" y="562" xml:space="preserve">Remote changes:</text>
<text x="54" y="590" xml:space="preserve">  MR docs/spec.txt</text>
<text x="54" y="618" xml:space="preserve">       modified on Drive</text>
<text x="54" y="646" xml:space="preserve">  +R design/roadmap.txt</text>
<text x="54" y="674" xml:space="preserve">       new on Drive</text>
<text x="54" y="702" xml:space="preserve">Local changes:</text>
<text x="54" y="730" xml:space="preserve">  ML notes/ideas.txt</text>
<text x="54" y="758" xml:space="preserve">       modified locally</text>
<text x="54" y="786" xml:space="preserve">  +L drafts/todo.txt</text>
<text x="54" y="814" xml:space="preserve">       new locally</text>
<text x="54" y="842" xml:space="preserve"></text>
<text x="54" y="870" xml:space="preserve">$ aethel add --all</text>
<text x="54" y="898" xml:space="preserve">Staged 4 change(s).</text>
<text x="54" y="926" xml:space="preserve"></text>
<text x="54" y="954" xml:space="preserve">$ aethel status</text>
<text x="54" y="982" xml:space="preserve">Staged changes (4):</text>
<text x="54" y="1010" xml:space="preserve">         download  docs/spec.txt</text>
<text x="54" y="1038" xml:space="preserve">         download  design/roadmap.txt</text>
<text x="54" y="1066" xml:space="preserve">           upload  notes/ideas.txt</text>
<text x="54" y="1094" xml:space="preserve">           upload  drafts/todo.txt</text>
<text x="54" y="1122" xml:space="preserve">Remote changes (2):</text>
<text x="54" y="1150" xml:space="preserve">  MR docs/spec.txt  (modified on Drive)</text>
<text x="54" y="1178" xml:space="preserve">  +R design/roadmap.txt  (new on Drive)</text>
<text x="54" y="1206" xml:space="preserve">Local changes (2):</text>
<text x="54" y="1234" xml:space="preserve">  ML notes/ideas.txt  (modified locally)</text>
<text x="54" y="1262" xml:space="preserve">  +L drafts/todo.txt  (new locally)</text>
<text x="54" y="1290" xml:space="preserve"></text>
<text x="54" y="1318" xml:space="preserve">$ aethel commit -m &quot;demo sync&quot;</text>
<text x="54" y="1346" xml:space="preserve">Commit complete: 2 downloaded, 2 uploaded</text>
<text x="54" y="1374" xml:space="preserve"></text>
<text x="54" y="1402" xml:space="preserve">$ aethel status</text>
<text x="54" y="1430" xml:space="preserve">Everything up to date.</text>
<text x="54" y="1458" xml:space="preserve"></text>
<text x="54" y="1486" xml:space="preserve">Inspect the demo workspace at: /tmp/aethel-demo-XXXXXX</text>
</g>
</svg>
